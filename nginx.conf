# ─────────────────────────────────────────────
# Nginx — Configuration EdeneBeauty Backend
# /etc/nginx/sites-available/edenebeauty
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name api.edenebeauty.com;

    # Redirection HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.edenebeauty.com;

    # Certificat SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.edenebeauty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.edenebeauty.com/privkey.pem;

    # Sécurité SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Headers sécurité
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # CORS (si frontend séparé)
    add_header Access-Control-Allow-Origin "https://edenebeauty.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css;

    # Rate limiting global
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=20 nodelay;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Cache statique (dashboard admin)
    location ~* \.(html|css|js|png|jpg|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/edenebeauty-access.log;
    error_log  /var/log/nginx/edenebeauty-error.log;
}
